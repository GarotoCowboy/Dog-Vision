spring:
  application:
    name: dog-management

  Jackson:
    time-zone: America/Sao_Paulo

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: always

api:
  security:
    token:
      secret: ${JWT_SECRET}


server:
  address: 0.0.0.0
  port: 3000



---

#PROFILE LOCAL PARA RODAR VIA INTELLIJ
spring:
  datasource:
    url: jdbc:postgresql://localhost:${BD_DOG_MANAGEMENT_PORT}/${BD_DOG_MANAGEMENT_NAME}
    password: ${BD_DOG_MANAGEMENT_PASSWORD}
    username: ${BD_DOG_MANAGEMENT_USER}
    driver-class-name: org.postgresql.Driver
  config:
    activate:
      on-profile: local
eureka:
  client:
    service-url:
      defaultZone: http://localhost:3002/eureka
  instance:
    prefer-ip-address: true

---

#PROFILE DOCKER PARA RODAR NO DOCKER
spring:
  datasource:
    url: jdbc:postgresql://${BD_DOG_MANAGEMENT_HOST}:5432/${BD_DOG_MANAGEMENT_NAME}
    password: ${BD_DOG_MANAGEMENT_PASSWORD}
    username: ${BD_DOG_MANAGEMENT_USER}
    driver-class-name: org.postgresql.Driver
  config:
    activate:
      on-profile: docker

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:3002/eureka
  instance:
    prefer-ip-address: true



